version: '3.7'

services:
  heimdall-proxy:
    build:
      dockerfile: ${HEIMDALL_PATH:-.}/docker/nginx/Dockerfile
      context: ${HEIMDALL_PATH:-.}
      target: dev
    ports:
      - 127.0.0.1:${HEIMDALL_NGINX_PORT:-80}:80
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
    environment:
      APP_CONTAINER: heimdall-node
      DOCKER_BACKEND: "unix:/var/run/docker.sock"

  heimdall-node:
    image: heimdall-node:latest
    build:
      dockerfile: Dockerfile
      context: ${HEIMDALL_PATH:-.}/docker/node
      target: dev
    volumes:
      - ${HEIMDALL_PATH:-./}:/srv/heimdall/current:cached
    expose:
      - 1337
    environment:
      UID: "${USER_UID?-Please export your UID in env var USER_UID}"
      GID: "${USER_GID?-Please export your GID in env var USER_GID}"
      APP_MODE: dev
      APP_DOMAIN: localhost
      APP_PORT: ${HEIMDALL_NGINX_PORT:-80}
      DOCKER_API_URL: "http://localhost:${HEIMDALL_NGINX_PORT:-80}/docker/"

  heimdall-test-healthy:
    container_name: heimdall-test-healthy
    image: busybox:latest
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  heimdall-test-unhealthy:
    container_name: heimdall-test-unhealthy
    image: busybox:latest
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "false"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 0s

  heimdall-test-exited:
    container_name: heimdall-test-exited
    image: busybox:latest
    command: ["sh", "-c", "exit 0"]
    restart: "no"
